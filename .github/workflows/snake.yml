name: generate-snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=1f6feb&color_dots=ebedf0,c8ddf7,9dc4f2,5fa1ec,1f6feb&color_background=ffffff
            dist/github-snake-dark.svg?color_snake=58a6ff&color_dots=161b22,1f2b3d,2c4a66,3d6d99,58a6ff&color_background=0d1117

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
